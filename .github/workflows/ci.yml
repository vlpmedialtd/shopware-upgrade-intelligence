name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python }}
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests
      - name: Type-check
        run: uv run mypy src
      - name: Tests
        run: uv run pytest -q
